<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibos</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Recibos</h1>
        <a href="/" class="btn btn-secondary mt-3 mb-3">Voltar</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Data de Entrada</th>
                    <th>Data de Saída</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for recibo in recibos %}
                <tr>
                    <td>{{ recibo.id }}</td>
                    <td>{{ recibo.cliente.nome }}</td>
                    <td>{{ recibo.data_entrada }}</td>
                    <td>{{ recibo.data_saida }}</td>
                    <td>{{ recibo.valor }}</td>
                    <td>
                        <a href="/recibo/{{ recibo.id }}/exportar" class="btn btn-info btn-sm">Exportar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
